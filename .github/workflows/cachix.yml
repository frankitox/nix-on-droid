name: Build bootstrap packages and push to cachix
on:
  push:
  workflow_dispatch:
jobs:
  cachix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            substituters = https://cache.nixos.org https://nix-on-droid.cachix.org https://frankitox.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-on-droid.cachix.org-1:56snoMJTXmDRC1Ei24CmKoUqvHJ9XCp+nidK7qkMQrU= frankitox.cachix.org-1:pFYDvySHaeLNXWss1XwNsTAIc+dhzKX6WUO1UBSZUBM=

      - name: Setup cachix
        uses: cachix/cachix-action@v14
        with:
          name: frankitox
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build bootstrap zip
        run: |
          nix \
            --log-format bar-with-logs \
            --option keep-going true \
            --show-trace \
            build .#bootstrapZip-aarch64 .#bootstrapZip-x86_64 \
            --impure
